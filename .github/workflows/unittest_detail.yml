name: Jest Test Details

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  test-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        id: jest
        run: |
          set +e
          npm test -- --json --outputFile=jest-results.json --coverage --coverageReporters=json --coverageReporters=json-summary
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          set -e

      - name: Send discord notification
        if: always()
        env:
          EXIT_CODE: ${{ steps.jest.outputs.exit_code }}
          BRANCH: ${{ github.ref_name }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          PROJECT_NAME=$(jq -r '.name' package.json)

          SUMMARY=$(jq -r '
            .testResults
            | group_by(.status)
            | map("\(.[0].status): \(length)")
            | join("\n")
          ' jest-results.json)

          DETAILS=$(jq -r '
            .testResults
            | map(
                "# File: \(.name)\n"
                +
                (
                  .assertionResults
                  | map(
                      if .status == "passed" then
                        "  PASSED - \(.fullName)"
                      else
                        "  FAILED - \(.fullName)"
                      end
                    )
                  | join("\n")
                )
              )
            | join("\n\n")
          ' jest-results.json)

          COVERAGE=$(jq -r '
            .total
            | "Statements: \(.statements.pct)%\nBranches: \(.branches.pct)%\nFunctions: \(.functions.pct)%\nLines: \(.lines.pct)%"
          ' coverage/coverage-summary.json)

          UNCOVERED_LINES=$(jq -r '
            to_entries
            | map(
                .key as $file
                | .value as $cov
                | ($cov.s // {}) as $counts
                | ($cov.statementMap // {}) as $stmts
                | [
                    $stmts
                    | to_entries[]
                    | select(($counts[.key|tostring] // 1) == 0)
                    | .value.start.line
                  ]
                | select(length > 0)
                | "\($file) - Uncovered lines: \(join(", "))"
              )
            | if length == 0 then
                "No uncovered lines"
              else
                join("\n")
              end
          ' coverage/coverage-final.json)

          if [ "$EXIT_CODE" = "0" ]; then
            STATUS="UnitTests passed"
            ICON="OK"
          else
            STATUS="UnitTests failed"
            ICON="FAIL"
          fi

          # Message 1/5 – Header
          {
            echo "Message 1/5"
            echo "# Project: $PROJECT_NAME"
            echo "Status: $ICON - $STATUS"
            echo "Branch: $BRANCH"
          } > message.txt

          jq -n --rawfile content message.txt '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                  -X POST \
                  -d @- \
                  "$WEBHOOK_URL"

          # Message 2/5 – Summary
          {
            echo "Message 2/5 - Summary"
            echo '```'
            echo "$SUMMARY"
            echo '```'
          } > message.txt

          jq -n --rawfile content message.txt '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                  -X POST \
                  -d @- \
                  "$WEBHOOK_URL"

          # Message 3/5 – Coverage
          {
            echo "Message 3/5 - Coverage"
            echo '```'
            echo "$COVERAGE"
            echo '```'
          } > message.txt

          jq -n --rawfile content message.txt '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                  -X POST \
                  -d @- \
                  "$WEBHOOK_URL"

          # Message 4/5 – Uncovered lines
          {
            echo "Message 4/5 - Lines Not Covered"
            echo '```'
            echo "$UNCOVERED_LINES"
            echo '```'
          } > message.txt

          jq -n --rawfile content message.txt '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                  -X POST \
                  -d @- \
                  "$WEBHOOK_URL"

          # Message 5/5 – Test details
          {
            echo "Message 5/5 - Test Details"
            echo '```'
            echo "$DETAILS"
            echo '```'
          } > message.txt

          jq -n --rawfile content message.txt '{content: $content}' \
            | curl -H "Content-Type: application/json" \
                  -X POST \
                  -d @- \
                  "$WEBHOOK_URL"
